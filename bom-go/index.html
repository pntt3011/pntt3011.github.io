<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BOM Go</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
  <main class="app-shell">

    <section class="card">
      <h2 class="section-title">BOM Go</h2>

      <!-- Step 1: Upload -->
      <div class="field-group">
        <label>
          <span>Excel File</span>
          <div class="file-drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".xlsx,.xls,.xlsm" />
            <div class="drop-label" id="dropLabel">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="12" y1="18" x2="12" y2="12" />
                <polyline points="9 15 12 12 15 15" />
              </svg>
              <span id="fileName">Click or drag & drop an Excel file</span>
            </div>
          </div>
        </label>
      </div>

      <!-- Step 2: Sheet selector -->
      <div class="field-group">
        <label>
          <span>Sheet</span>
          <select id="sheetSelect" disabled>
            <option value="">— upload a file first —</option>
          </select>
        </label>
      </div>

      <!-- Step 3: Parse -->
      <div class="action-row">
        <button id="parseBtn" class="primary-button" disabled>Parse</button>
        <span id="statusMsg" class="status-msg"></span>
      </div>
    </section>

  </main>

  <script type="module" src="./app.js"></script>
</body>

</html>
