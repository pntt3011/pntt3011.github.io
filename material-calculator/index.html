<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Material Calculator</title>
    <meta name="description"
        content="Upload a BOM Excel file, parse it into JSON, and compute a cutting plan for each material group." />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>

<body>
    <main class="app-shell bom-app">
        <section class="card input-card">
            <div class="panel-header">
                <div class="panel-title">
                    <h1>
                        <img src="../steel-cutter/logo.png" alt="" />
                        Phần mềm vật tư
                    </h1>
                </div>
                <span id="appStatus" class="status-pill status-pill--loading">Đang chờ file</span>
            </div>

            <div id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Chọn file Excel">
                <input id="fileInput" class="file-input" type="file" accept=".xlsx,.xls,.xlsm" />
                <div class="dropzone-icon" aria-hidden="true">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 3v12"></path>
                        <path d="m8 7 4-4 4 4"></path>
                        <path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path>
                    </svg>
                </div>
                <div class="dropzone-copy">
                    <h2>Thả file BOM vào đây</h2>
                    <p>Hỗ trợ .xlsx, .xls, .xlsm</p>
                </div>
                <button type="button" class="secondary-button browse-button">Chọn file Excel</button>
            </div>

            <div id="productListSection" class="product-list-section" hidden>
                <div class="section-header">
                    <span class="section-title">Danh sách sản phẩm</span>
                    <span id="productCount" class="item-count"></span>
                </div>
                <div id="productList" class="product-list"></div>
            </div>

            <div class="calculate-section">
                <button id="calculateButton" type="button" class="primary-button calculate-button" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="4" y="2" width="16" height="20" rx="2"></rect>
                        <line x1="8" y1="6" x2="16" y2="6"></line>
                        <line x1="8" y1="10" x2="16" y2="10"></line>
                        <line x1="8" y1="14" x2="12" y2="14"></line>
                    </svg>
                    Tính toán
                </button>
                <p class="calc-hint">Tải file BOM và chọn ít nhất một sản phẩm</p>
            </div>
        </section>

        <section class="card results-card">
            <div class="panel-header">
                <div class="panel-title">
                    <h2 id="resultsPanelTitle">Thông tin lệnh sản xuất</h2>
                </div>
                <button id="exportButton" type="button" class="secondary-button export-button" disabled>
                    Xuất Excel
                </button>
            </div>

            <div id="resultsList" class="results-list">
                <div class="empty-state empty-state--wide">
                    <div class="empty-state-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16v16H4z"></path>
                            <path d="M4 9h16"></path>
                            <path d="M9 4v16"></path>
                        </svg>
                    </div>
                    <h4>Chờ file Excel đầu vào</h4>
                </div>
            </div>
        </section>
    </main>

    <script src="./bom_parser.js"></script>
    <script type="module" src="./app.js"></script>
</body>

</html>
