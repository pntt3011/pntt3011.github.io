<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phần mềm cắt phôi</title>
    <meta name="description"
        content="Công cụ tối ưu hóa cắt thép — chọn kích thước hộp, thêm chi tiết, và tính toán kế hoạch cắt tối ưu." />
    <link rel="stylesheet" href="./styles.css" />
    <!-- SheetJS Excel Styling Library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>

<body>
    <main class="app-shell">

        <!-- ── Material ── -->
        <section class="card section-material">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap;">
                <h2 class="section-title"
                    style="margin: 0; display: flex; align-items: center; gap: 8px; text-transform: none; font-size: 1.05rem; color: var(--text); letter-spacing: normal;">
                    <img src="../shared/logo.png" alt="Kingston" style="width: 24px; height: 24px; object-fit: contain;" />
                    Phần mềm cắt phôi
                </h2>
                <span id="datasetStatus" class="status-pill status-pill--loading">Đang tải…</span>
            </div>
            <div class="material-row-3">
                <label>
                    <span>LSX</span>
                    <input id="projectName" type="text" placeholder="Nhập để xuất trong excel" />
                </label>
                <label>
                    <span>Chiều dài vật tư</span>
                    <input id="materialLengthCm" type="number" min="1" step="1" value="6000" />
                </label>
                <label>
                    <span>Kích thước bó</span>
                    <input id="bundleSize" type="number" min="1" step="1" value="1" />
                </label>
            </div>
        </section>

        <!-- ── Components ── -->
        <section class="card section-components">

            <!-- Cut list table -->
            <div class="table-wrap">
                <table class="data-table" id="componentsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Chiều dài cần cắt (mm)</th>
                            <th>Số lượng</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="selectedListBody"></tbody>
                    <tfoot>
                        <tr class="add-row">
                            <td class="row-num-cell add-row-icon">+</td>
                            <td>
                                <input id="customLengthInput" type="number" class="inline-select" min="1" step="1" placeholder="Chiều dài (mm)" />
                            </td>
                            <td>
                                <input id="addRowQtyInput" type="number" class="qty-input" min="1" step="1" placeholder="SL" />
                            </td>
                            <td class="remove-cell add-row-enter" aria-hidden="true">↵</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <!-- Calculate button -->
            <div class="components-footer">
                <button id="calculateButton" type="button" class="primary-button calculate-btn" disabled>
                    Tính Toán
                </button>
                <p class="calc-hint">Thêm ít nhất một chi tiết để tính toán</p>
            </div>
        </section>

        <!-- ── Results ── -->
        <section class="card section-results" id="resultsSection">
            <div id="resultList" class="results-grid"></div>
        </section>

    </main>

    <!-- Template: one row in the cut-list table -->
    <template id="selectedRowTemplate">
        <tr>
            <td class="row-num-cell"></td>
            <td class="length-cell"></td>
            <td>
                <input class="qty-input" type="number" min="1" step="1" />
            </td>
            <td class="remove-cell">
                <button type="button" class="remove-btn" aria-label="Xóa dòng" title="Xóa">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round">
                        <line x1="3" y1="8" x2="13" y2="8" />
                    </svg>
                </button>
            </td>
        </tr>
    </template>

    <!-- Template: one result card -->
    <template id="resultCardTemplate">
        <div class="result-card">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;">
                <h3 style="margin: 0;"></h3>
                <button type="button" class="secondary-button export-btn"
                    style="display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 0.82rem; height: 34px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Xuất Excel
                </button>
            </div>
            <p class="result-meta"></p>
            <ul class="pattern-list"></ul>
        </div>
    </template>

    <!-- ── Modal Hướng Dẫn Sử Dụng ── -->
    <!-- Help modal removed per request -->

    <script type="module" src="./app.js"></script>
</body>

</html>
