<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Steel Cutter Calculator</title>
    <meta name="description"
        content="Steel cutting stock optimizer — select box dimensions, add components, and compute the optimal cut plan." />
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <main class="app-shell">

        <!-- ── Header ── -->
        <header class="topbar">
            <h1>Steel Cutter Calculator</h1>
            <div class="hero-meta">
                <span id="datasetStatus" class="status-pill status-pill--loading">Loading…</span>
                <span id="matchCount" class="meta-line">0 matching components</span>
            </div>
        </header>

        <!-- ── Material ── -->
        <section class="card section-material">
            <h2 class="section-title">Material</h2>
            <div class="material-row">
                <label>
                    <span>Order name</span>
                    <select id="orderNameMaterialSelect">
                        <option value="">Select Order…</option>
                    </select>
                </label>
                <label>
                    <span>Stock length</span>
                    <input id="materialLengthCm" type="number" min="1" step="1" value="6000" />
                </label>
            </div>
            <div class="material-row">
                <label>
                    <span>Box length</span>
                    <select id="lengthOfBoxCm" disabled>
                        <option value="">…</option>
                    </select>
                </label>
                <label>
                    <span>Box width</span>
                    <select id="widthOfBoxCm" disabled>
                        <option value="">…</option>
                    </select>
                </label>
                <label>
                    <span>Bundle size</span>
                    <input id="bundleSize" type="number" min="1" step="1" value="10" />
                </label>
            </div>
        </section>

        <!-- ── Components ── -->
        <section class="card section-components">
            <h2 class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
                Components
                <label style="display: flex; align-items: center; gap: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);">
                    <input type="checkbox" id="customModeCheckbox" style="width: auto; margin: 0; cursor: pointer;"> Custom mode
                </label>
            </h2>

            <!-- Inline cut list table (add row lives in tfoot) -->
            <div class="table-wrap">
                <table class="data-table" id="componentsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Length (mm)</th>
                            <th>QTY</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="selectedListBody"></tbody>
                    <tfoot>
                        <tr class="add-row" id="addRow">
                            <td></td>
                            <td>
                                <select id="lengthSelect" class="inline-select" disabled>
                                    <option value="">Length…</option>
                                </select>
                                <input id="customLengthInput" type="number" class="inline-select" placeholder="Length (mm)" style="display: none;" min="1" step="1" />
                            </td>
                            <td>
                                <input id="addRowQtyInput" type="number" class="qty-input" min="1" step="1" disabled />
                            </td>
                            <td>
                                <button id="addComponentButton" type="button" class="primary-button inline-btn" disabled>Add</button>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <!-- Calculate button inside Components card -->
            <div class="components-footer">
                <button id="calculateButton" type="button" class="primary-button calculate-btn" disabled>
                    Calculate
                </button>
            </div>
        </section>

        <!-- ── Results ── -->
        <section class="card section-results" id="resultsSection">
            <h2 class="section-title">Results</h2>
            <div id="resultList" class="results-grid"></div>
        </section>

    </main>

    <!-- Template: one row in the cut-list table -->
    <template id="selectedRowTemplate">
        <tr>
            <td class="row-num-cell"></td>
            <td class="length-cell"></td>
            <td>
                <input class="qty-input" type="number" min="1" step="1" />
            </td>
            <td class="remove-cell">
                <button type="button" class="remove-btn" aria-label="Remove row" title="Remove">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round">
                        <line x1="3" y1="8" x2="13" y2="8" />
                    </svg>
                </button>
            </td>
        </tr>
    </template>

    <!-- Template: one result card -->
    <template id="resultCardTemplate">
        <div class="result-card">
            <h3></h3>
            <p class="result-meta"></p>
            <ul class="pattern-list"></ul>
        </div>
    </template>

    <script type="module" src="./app.js"></script>
</body>

</html>
