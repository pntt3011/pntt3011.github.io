<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cutting Stock Optimizer</title>
    <link rel="stylesheet" href="./styles.css" />
</head>

<body>
    <main class="app-shell">
        <header class="topbar">
            <h1>Cutting stock optimizer</h1>
            <div class="hero-meta">
                <span id="datasetStatus" class="status-pill status-pill--loading">Loading</span>
                <span id="matchCount" class="meta-line">0 matches</span>
            </div>
        </header>

        <section class="grid">
            <section class="card">
                <h2>Setup</h2>
                <div class="form-grid">
                    <label>
                        <span>Box length</span>
                        <select id="lengthOfBoxCm">
                            <option value="">Choose length</option>
                        </select>
                    </label>
                    <label>
                        <span>Box width</span>
                        <select id="widthOfBoxCm">
                            <option value="">Choose width</option>
                        </select>
                    </label>
                    <label>
                        <span>Stock length</span>
                        <input id="materialLengthCm" type="number" min="1" step="1" placeholder="6000" />
                    </label>
                </div>
            </section>

            <section class="card">
                <h2>Components</h2>
                <div class="picker-grid">
                    <label>
                        <span>Order</span>
                        <select id="orderSelect">
                            <option value="">Choose an order</option>
                        </select>
                    </label>
                    <label>
                        <span>Parent</span>
                        <select id="parentSelect" disabled>
                            <option value="">Choose a parent component</option>
                        </select>
                    </label>
                    <label>
                        <span>Component</span>
                        <select id="componentSelect" disabled>
                            <option value="">Choose a component</option>
                        </select>
                    </label>
                </div>

                <div class="component-preview" id="componentPreview">
                    <p>Pick a component.</p>
                </div>

                <div class="actions-row">
                    <button id="addComponentButton" type="button" class="primary-button" disabled>Add</button>
                    <button id="resetSelectionButton" type="button" class="secondary-button">Reset</button>
                </div>
            </section>
        </section>

        <section class="card">
            <h2>Selected cut list</h2>
            <div class="table-wrap">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order</th>
                            <th>Parent</th>
                            <th>Component</th>
                            <th>Length</th>
                            <th>qty</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="selectedListBody">
                        <tr class="empty-row">
                            <td colspan="6">No components selected.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="card footer-card compact-footer">
            <button id="calculateButton" type="button" class="primary-button" disabled>Optimize</button>
        </section>

        <section class="card">
            <h2>Result</h2>
            <p id="resultSummary" class="result-summary">No result.</p>
            <div id="resultList" class="results-grid"></div>
        </section>
    </main>

    <template id="selectedRowTemplate">
        <tr>
            <td class="order-cell"></td>
            <td class="parent-cell"></td>
            <td class="component-cell"></td>
            <td class="length-cell"></td>
            <td>
                <input class="qty-input" type="number" min="1" step="1" />
            </td>
            <td>
                <button type="button" class="icon-button remove-button">Remove</button>
            </td>
        </tr>
    </template>

    <template id="resultCardTemplate">
        <article class="result-card">
            <header>
                <h3></h3>
                <p class="result-meta"></p>
            </header>
            <ul class="pattern-list"></ul>
        </article>
    </template>

    <script type="module" src="./app.js"></script>
</body>

</html>
