<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Cutter</title>
    <meta name="description"
        content="Chọn sản phẩm và số lượng, tính toán kế hoạch cắt vật tư." />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>

<body>
    <main class="app-shell bom-app">
        <section class="card input-card">
            <div class="panel-header">
                <div class="panel-title">
                    <h1>
                        <img src="../shared/logo.png" alt="Kingston" />
                        Cắt vật tư sản phẩm
                    </h1>
                </div>
                <span id="appStatus" class="status-pill status-pill--loading">Đang chờ dữ liệu</span>
            </div>

            <div class="select-section">
                <label class="section-title" for="productSearch">Chọn mã sản phẩm</label>
                <input id="productSearch" type="text" placeholder="Tìm theo mã hoặc tên sản phẩm..." autocomplete="off" />
                <select id="productSelect" multiple size="8"></select>
            </div>

            <div id="selectedListSection" class="product-list-section" hidden>
                <div class="section-header">
                    <span class="section-title">Sản phẩm đã chọn</span>
                    <span id="selectedCount" class="item-count"></span>
                </div>
                <div id="selectedList" class="product-list"></div>
            </div>

            <div class="calculate-section">
                <button id="calculateButton" type="button" class="primary-button calculate-button" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="4" y="2" width="16" height="20" rx="2"></rect>
                        <line x1="8" y1="6" x2="16" y2="6"></line>
                        <line x1="8" y1="10" x2="16" y2="10"></line>
                        <line x1="8" y1="14" x2="12" y2="14"></line>
                    </svg>
                    Tính toán
                </button>
                <p class="calc-hint">Chọn ít nhất một sản phẩm và số lượng</p>
            </div>
        </section>

        <section class="card results-card">
            <div class="panel-header">
                <div class="panel-title">
                    <h2>Kế hoạch cắt vật tư</h2>
                </div>
            </div>

            <div id="resultsList" class="results-list">
                <div class="empty-state empty-state--wide">
                    <div class="empty-state-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16v16H4z"></path>
                            <path d="M4 9h16"></path>
                            <path d="M9 4v16"></path>
                        </svg>
                    </div>
                    <h4>Đang tải dữ liệu sản phẩm</h4>
                </div>
            </div>
        </section>
    </main>

    <script src="./data-parser.js"></script>
    <script type="module" src="./app.js"></script>
</body>

</html>
